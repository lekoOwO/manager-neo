name: CI and Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install frontend deps
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm build

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build backend (release)
        run: |
          cargo build --manifest-path backend/Cargo.toml --release

      - name: Package artifacts
        run: |
          mkdir -p dist
          # backend binary
          BIN_PATH=$(ls backend/target/release | grep manager || true)
          if [ -f backend/target/release/manager-neo-backend ]; then
            cp backend/target/release/manager-neo-backend dist/manager-neo-backend
          else
            # try to find any executable in backend/target/release
            cp $(ls backend/target/release | grep -E '^(manager|manager-neo|manager-neo-backend)$' || true) dist/ || true
          fi
          # frontend dist
          if [ -d frontend/dist ]; then
            tar -czf dist/frontend-dist.tar.gz -C frontend dist
          fi

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ci-${{ github.run_id }}
          release_name: CI build ${{ github.run_id }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package artifacts (tar)
        run: |
          tar -czf dist/manager-neo-artifacts-${{ github.run_id }}.tar.gz -C dist . || true

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/manager-neo-artifacts-${{ github.run_id }}.tar.gz
          asset_name: manager-neo-artifacts-${{ github.run_id }}.tar.gz
          asset_content_type: application/gzip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List workflow runs
        run: gh run list --limit 5 || true
